<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MEFX-S3 設計図 見取り図</title>
    <style>
      :root {
        color: #111;
        background: #f7f3ea;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        line-height: 1.7;
      }

      .sheet {
        overflow: auto;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: white;
      }

      img {
        display: block;
        width: 100%;
        min-width: 980px;
        height: auto;
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 16px 0;
      }

      a {
        color: #0b5cad;
        font-weight: 700;
      }

      @media print {
        body {
          padding: 0;
        }

        .links,
        .note {
          display: none;
        }

        .sheet {
          border: 0;
          overflow: visible;
        }

        img {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MEFX-S3 設計図 見取り図</h1>
      <p class="note">
        配線を始める前に見るための全体図です。細かいピン番号や部品値は実体配線図と配線表を見てください。
      </p>
      <div class="links">
        <a href="./実体配線図.md">実体配線図</a>
        <a href="./配線表.csv">配線表CSV</a>
        <a href="./配線図を見ながら作る.html">配線図を見ながら作る</a>
      </div>
      <div class="sheet">
        <img src="./設計図_見取り図.svg" alt="MEFX-S3 マルチエフェクター設計図 見取り図" />
      </div>
    </main>
  </body>
</html>
